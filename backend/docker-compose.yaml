
services:
  mongodb:
    image: mongo:latest
    container_name: smartCv-mongodb
    restart: unless-stopped
    ports:
      - "${DB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mongodb_data_vol:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartCv-net

  redis:
    image: redis:7-alpine
    container_name: smartCv-redis
    command: redis-server --appendonly yes --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - smartCv-net

volumes:
  mongodb_data_vol:
  redis_data:

networks:
  smartCv-net:
    driver: bridge