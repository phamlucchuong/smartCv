name: ai-ci.yml

on:
  push:
    branches: ["dev"]
    paths:
      - 'ai_engine_service/**'
  pull_request:
    branches: ["main", "dev"]
    paths:
      - 'ai_engine_service/**'

jobs:
  build-and-test-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: |
          cd ai_engine_service
          chmod +x mvnw
          ./mvnw compile -DskipTests

      - name: Run Tests
        run: |
          cd ai_engine_service
          ./mvnw test -Dspring.ai.ollama.chat.enabled=false
