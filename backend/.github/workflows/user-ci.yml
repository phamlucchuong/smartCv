name: user-ci.yml
on:
  push:
    branches: ["dev" ]
    paths:
      - 'user-service/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'user-service/**'
jobs:
  test-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: |
          cd user-service
          chmod +x mvnw
          ./mvnw test