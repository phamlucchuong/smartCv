name: user-ci.yml
on:
  push:
    branches: ["dev" ]
    paths:
      - 'user-service/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'user-service/**'
jobs:
  test-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Auth Tests
        run: |
          cd user-service
          mvn clean test