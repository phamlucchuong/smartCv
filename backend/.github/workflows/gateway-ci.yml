name: CI API Gateway

on:
  push:
    branches: [dev" ]
    paths:
      - 'api-gateway/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'api-gateway/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: "maven"

      - name: Run Tests
        run: |
          cd api-gateway
          ./mvnw test 

      - name: Build Docker Image
        run: |
          docker build -t my-reg/api-gateway:${{ github.sha }} ./api-gateway