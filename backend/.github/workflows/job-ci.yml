name: job-ci.yml
on:
  push:
    branches: ["dev" ]
    paths:
      - 'job_service/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'job_service/**'

jobs:
  test-job:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: |
          cd job_service
          chmod +x mvnw
          ./mvnw test
