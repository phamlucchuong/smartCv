server:
  port: ${AI_SERVICE_PORT:8085}
  servlet:
    context-path: /ai

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: ai_engine_service
  data:
    mongodb:
      host: ${MONGO_DB_HOST:localhost}
      port: ${MONGO_DB_PORT:27017}
      username: ${MONGO_DB_USERNAME:admin}
      password: ${MONGO_DB_PASSWORD:password}
      database: ${AI_MONGO_DB_NAME:ai_engine_db}
      authentication-database: admin
  main:
    banner-mode: "off"
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin123}

app:
  gateway:
    internal-secret: ${GATEWAY_INTERNAL_SECRET:changeme}
  user-service:
    base-url: ${USER_SERVICE_URL:http://localhost:8081/user}
  job-service:
    base-url: ${JOB_SERVICE_URL:http://localhost:8082/job}
  application-service:
    base-url: ${APPLICATION_SERVICE_URL:http://localhost:8083/application}
  ai:
    recommend-batch-size: ${AI_RECOMMEND_BATCH:20}

logging:
  level:
    root: WARN
    "vn.chuongpl.ai_engine_service": INFO
    "org.springframework.ai": INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
