server:
  port: ${AI_SERVICE_PORT:8085}
  servlet:
    context-path: /ai

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: ai_engine_service
  autoconfigure:
    exclude:
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiChatAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiImageAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  data:
    mongodb:
      host: ${MONGO_DB_HOST:localhost}
      port: ${MONGO_DB_PORT:27017}
      username: ${MONGO_DB_USERNAME:admin}
      password: ${MONGO_DB_PASSWORD:password}
      database: ${AI_MONGO_DB_NAME:ai_engine_db}
      authentication-database: admin
  main:
    banner-mode: "off"
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin123}

app:
  gateway:
    internal-secret: ${GATEWAY_INTERNAL_SECRET:changeme}
  user-service:
    base-url: ${USER_SERVICE_URL:http://localhost:8081/user}
  job-service:
    base-url: ${JOB_SERVICE_URL:http://localhost:8082/job}
  application-service:
    base-url: ${APPLICATION_SERVICE_URL:http://localhost:8083/application}
  ai:
    recommend-batch-size: ${AI_RECOMMEND_BATCH:20}
    providers:
      groq:
        api-key: ${GROQ_API_KEY:}
        base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
        model: ${GROQ_DEFAULT_MODEL:llama-3.3-70b-versatile}
      gemini:
        api-key: ${GEMINI_API_KEY:}
        base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
        model: ${GEMINI_DEFAULT_MODEL:gemini-2.0-flash}
      anthropic:
        api-key: ${ANTHROPIC_API_KEY:}
        model: ${ANTHROPIC_DEFAULT_MODEL:claude-haiku-4-5-20251001}
      azure-openai:
        api-key: ${AZURE_OPENAI_API_KEY:}
        endpoint: ${AZURE_OPENAI_ENDPOINT:}
        deployment-name: ${AZURE_OPENAI_DEPLOYMENT_NAME:gpt-4o}

logging:
  level:
    root: WARN
    "vn.chuongpl.ai_engine_service": INFO
    "org.springframework.ai": INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
