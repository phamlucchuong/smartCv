server:
  port: 8080

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      routes:
        - id: user-auth
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/user/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/user/**
        - id: job-service
          uri: ${JOB_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/job/**
        - id: application-service
          uri: ${APP_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/application/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/notification/**
        - id: ai-service
          uri: ${AI_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/ai/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  main:
    banner-mode: off
    log-startup-info: false
  output:
    ansi:
      enabled: always

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    bypass-token: ${JWT_BYPASS_TOKEN:}
    bypass-user-id: ${JWT_BYPASS_USER_ID:test-user}
    bypass-scope: ${JWT_BYPASS_SCOPE:ROLE_ADMIN}
  gateway:
    internal-secret: ${GATEWAY_INTERNAL_SECRET:changeme}
  public-routes:
    - method: POST
      path: /user/api/auth/register
    - method: POST
      path: /user/api/auth/verify-registration
    - method: POST
      path: /user/api/auth/resend-otp
    - method: POST
      path: /user/api/auth/forgot-password
    - method: POST
      path: /user/api/auth/reset-password
    - method: POST
      path: /user/api/auth/login
    - method: POST
      path: /user/api/auth/introspect
    - method: POST
      path: /user/api/auth/refresh
    - method: GET
      path: /user/api/users/verify-email/**
    - method: GET
      path: /job/api/jobs
    - method: GET
      path: /job/api/jobs/search
    - method: GET
      path: /job/api/jobs/*
    - method: GET
      path: /notification/api/otp/verify
    - method: POST
      path: /notification/api/otp/send
    - method: GET
      path: /user/api/companies
    - method: GET
      path: /user/api/companies/**
    - method: GET
      path: /job/api/home/**
    - method: GET
      path: /job/api/jobs/*/related

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.springframework.boot: WARN
    org.springframework.cloud: WARN
    org.springframework.data: WARN
    reactor.netty: WARN
    "vn.chuongpl.api_gateway": INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %msg%n"
