name: noti-ci.yml
on:
  push:
    branches: ["dev" ]
    paths:
      - 'notification-service/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'notification-service/**'

jobs:
  test-noti:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache-dependency-path: notification-service/go.sum

      - name: Install dependencies
        run: |
          cd notification-service
          go mod download

      - name: Run Tests
        run: |
          cd notification-service
          go test ./... -v

      - name: Build
        run: |
          cd notification-service
          go build -v ./cmd/server
