name: Notification Service CI

on:
  push:
    branches: ["dev"]
    paths:
      - "backend/notification-service/**"
      - ".github/workflows/noti-ci.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "backend/notification-service/**"
      - ".github/workflows/noti-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate notification-service
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare env file
        run: |
          if [ -f backend/.env.example ]; then
            cp backend/.env.example backend/.env
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          cache-dependency-path: backend/notification-service/go.sum

      - name: Check formatting
        working-directory: backend/notification-service
        run: test -z "$(gofmt -l .)"

      - name: Install dependencies
        working-directory: backend/notification-service
        run: go mod download

      - name: Run go vet
        working-directory: backend/notification-service
        run: go vet ./...

      - name: Run tests
        working-directory: backend/notification-service
        run: go test ./... -v

      - name: Build
        working-directory: backend/notification-service
        run: go build -v ./cmd/server
