name: Notification Service CI

on:
  push:
    branches: ["dev"]
    paths:
      - "backend/notification-service/**"
      - ".github/workflows/noti-ci.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "backend/notification-service/**"
      - ".github/workflows/noti-ci.yml"

jobs:
  test-noti:
    name: Validate notification-service
    runs-on: ubuntu-latest
    env:
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: |
          if [ -f backend/.env.example ]; then
            cp backend/.env.example backend/.env
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          cache-dependency-path: backend/notification-service/go.sum

      - name: Prepare Go cache directories
        run: mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Check formatting
        working-directory: backend/notification-service
        run: |
          test -z "$(gofmt -l .)"

      - name: Install dependencies
        working-directory: backend/notification-service
        run: go mod download

      - name: Run go vet
        working-directory: backend/notification-service
        run: go vet ./...

      - name: Run Tests
        working-directory: backend/notification-service
        run: go test ./... -v

      - name: Build
        working-directory: backend/notification-service
        run: go build -v ./cmd/server
