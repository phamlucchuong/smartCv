name: Frontend Quality

on:
  push:
    branches: ["dev", "main"]
    paths:
      - "frontend/apps/**"
      - "frontend/packages/**"
      - "frontend/test/**"
      - ".github/workflows/frontend-quality.yml"
      - "frontend/package.json"
      - "frontend/pnpm-lock.yaml"
      - "frontend/pnpm-workspace.yaml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "frontend/apps/**"
      - "frontend/packages/**"
      - "frontend/test/**"
      - ".github/workflows/frontend-quality.yml"
      - "frontend/package.json"
      - "frontend/pnpm-lock.yaml"
      - "frontend/pnpm-workspace.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web-candidate
            label: Candidate
          - app: web-recruiter
            label: Recruiter
          - app: web-admin
            label: Admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -F ${{ matrix.app }} lint

      - name: Typecheck
        run: pnpm -F ${{ matrix.app }} typecheck

      - name: Test with coverage
        run: pnpm -F ${{ matrix.app }} test:coverage

      - name: Build
        run: pnpm -F ${{ matrix.app }} build
