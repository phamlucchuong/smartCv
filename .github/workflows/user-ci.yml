name: user-ci.yml
on:
  push:
    branches: [ "main" ]
    paths:
      - 'user-service/**'    # Chỉ chạy khi code trong thư mục này thay đổi
      - '.github/workflows/ci-auth-service.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'user-service/**'
jobs:
  test-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Auth Tests
        # Lưu ý: Phải di chuyển vào thư mục service trước khi chạy lệnh
        run: |
          cd user-service
          mvn clean test