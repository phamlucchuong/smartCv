name: Reusable Java Service CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      test_command:
        required: false
        type: string
        default: ./mvnw test
      lint_command:
        required: false
        type: string
        default: ./mvnw -B -ntp checkstyle:check -Dcheckstyle.config.location=../../tools/checkstyle/checkstyle.xml -Dcheckstyle.includeTestSourceDirectory=true -Dcheckstyle.consoleOutput=true
      build_command:
        required: false
        type: string
        default: ./mvnw -B -ntp -DskipTests compile

jobs:
  validate:
    name: Validate ${{ inputs.service_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare env file
        run: |
          if [ -f backend/.env.example ]; then
            cp backend/.env.example backend/.env
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: ${{ inputs.service_path }}
        run: chmod +x mvnw

      - name: Lint
        working-directory: ${{ inputs.service_path }}
        run: ${{ inputs.lint_command }}

      - name: Compile
        working-directory: ${{ inputs.service_path }}
        run: ${{ inputs.build_command }}

      - name: Run tests
        working-directory: ${{ inputs.service_path }}
        run: ${{ inputs.test_command }}
