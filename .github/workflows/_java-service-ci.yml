name: Reusable Java Service CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      test_command:
        required: false
        type: string
        default: ./mvnw test

jobs:
  test:
    name: Test ${{ inputs.service_name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: ${{ inputs.service_path }}
        run: |
          chmod +x mvnw
          ${{ inputs.test_command }}
