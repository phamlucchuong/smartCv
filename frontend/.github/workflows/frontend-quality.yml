name: Frontend Quality

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'test/**'
      - '.github/workflows/frontend-quality.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  push:
    branches:
      - dev
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'test/**'
      - '.github/workflows/frontend-quality.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web-candidate
            label: Candidate
          - app: web-recruiter
            label: Recruiter
          - app: web-admin
            label: Admin

    name: ${{ matrix.label }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint ${{ matrix.label }}
        run: pnpm -F ${{ matrix.app }} lint

      - name: Typecheck ${{ matrix.label }}
        run: pnpm -F ${{ matrix.app }} typecheck

      - name: Run tests with coverage for ${{ matrix.label }}
        run: pnpm -F ${{ matrix.app }} test:coverage

      - name: Build ${{ matrix.label }}
        run: pnpm -F ${{ matrix.app }} build
